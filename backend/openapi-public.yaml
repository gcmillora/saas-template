openapi: 3.0.0
info:
  title: "SaaS Template Public API"
  version: "1.0.0"
paths:
  /signin:
    post:
      operationId: post-api-v1-signin
      summary: "Logs in a user and returns a session cookie"
      requestBody:
        required: true
        description: "User credentials"
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: "Login successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Invalid credentials"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /signup:
    post:
      operationId: post-api-v1-signup
      summary: "Sign up a new user"
      requestBody:
        required: true
        description: "User signup credentials"
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - confirm_password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                confirm_password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        "200":
          description: "Signup successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /signout:
    post:
      operationId: post-api-v1-signout
      summary: "Signs out the current user by clearing the session"
      responses:
        "200":
          description: "Signout successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /forgot-password:
    post:
      operationId: post-api-v1-forgot-password
      summary: "Request a password reset email"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: "Request accepted"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /reset-password:
    post:
      operationId: post-api-v1-reset-password
      summary: "Reset password using a token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
                - confirm_password
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
                confirm_password:
                  type: string
      responses:
        "200":
          description: "Password reset successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Validation error or invalid token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
components:
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationError:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            errors:
              type: array
              items:
                type: string
