components:
  schemas:
    # Standard error response
    Error:
      type: object
      properties:
        message:
          type: string

    # Auth-related schemas
    BaseUser:
      description: Base user detail
      type: object
      properties:
        email:
          type: string
          format: email
        id:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
      required:
        - id
        - email

