openapi: 3.0.0
info:
  title: "SaaS Template API"
  version: "1.0.0"
servers:
  - url: "http://localhost:4000"
paths:
  /user:
    get:
      operationId: get-api-v1-user
      summary: "Return authenticated user"
      responses:
        "200":
          description: "Current user information"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseUser"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /user/onboarding:
    patch:
      operationId: patch-api-v1-user-onboarding
      summary: Update user onboarding preferences
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOnboardingRequest"
      responses:
        "200":
          description: Onboarding preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseUser"
        "401":
          description: Unauthorized

components:
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string

    BaseUser:
      description: Base user detail
      type: object
      properties:
        email:
          type: string
          format: email
        id:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, user]
        onboardingCompleted:
          type: boolean
      required:
        - id
        - email
        - role
        - onboardingCompleted

    UpdateOnboardingRequest:
      type: object
      required:
        - onboardingCompleted
      properties:
        onboardingCompleted:
          type: boolean
