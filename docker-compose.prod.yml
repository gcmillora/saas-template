services:
  backend:
    image: ghcr.io/your-org/saas-template-backend:latest
    container_name: saas-backend
    restart: unless-stopped
    networks:
      - app
    environment:
      APP_ENV: production
      SERVER_PORT: "8008"
      LOG_LEVEL: info
      APP_BASE_URL: ${APP_BASE_URL}
      APP_SECRET: ${APP_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@example.com}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Running migrations..."
        /goose -dir /migrations postgres "$DATABASE_URL" up
        echo "Starting server..."
        exec /server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8008/api/public/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/your-org/saas-template-frontend:latest
    container_name: saas-frontend
    restart: unless-stopped
    networks:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: saas-nginx
    restart: unless-stopped
    networks:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    image: amir20/dozzle:latest
    container_name: saas-dozzle
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd00:db8:1::/64
